<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Identify Watch Images – 254 Chronos</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #111; color: #eee; font-family: Arial, sans-serif; padding: 20px; }
  h1 { color: #D4AF37; margin-bottom: 8px; }
  p { color: #aaa; margin-bottom: 24px; font-size: 0.9rem; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 16px; }
  .card { background: #1e1e1e; border: 2px solid #333; border-radius: 10px; overflow: hidden; }
  .card img { width: 100%; height: 200px; object-fit: cover; display: block; }
  .card-body { padding: 10px; }
  .card-num { font-size: 0.75rem; color: #D4AF37; font-weight: bold; margin-bottom: 6px; }
  select { width: 100%; background: #111; border: 1px solid #D4AF37; color: #eee; 
           padding: 6px 8px; border-radius: 6px; font-size: 0.82rem; cursor: pointer; margin-bottom: 6px; }
  textarea { width: 100%; background: #111; border: 1px solid #444; color: #eee;
             padding: 6px; border-radius: 6px; font-size: 0.78rem; resize: vertical; height: 48px; }
  .card.assigned { border-color: #D4AF37; }
  .save-btn { display: block; margin: 32px auto 0; background: #D4AF37; color: #111;
              border: none; padding: 14px 40px; border-radius: 8px; font-size: 1rem;
              font-weight: bold; cursor: pointer; letter-spacing: 1px; }
  .save-btn:hover { background: #e8c84a; }
  #output { margin-top: 24px; background: #1e1e1e; border: 1px solid #D4AF37; border-radius: 8px;
            padding: 20px; white-space: pre-wrap; font-size: 0.75rem; color: #aaa; display: none; }
  .copy-btn { margin-top: 10px; background: #333; color: #D4AF37; border: 1px solid #D4AF37;
              padding: 8px 20px; border-radius: 6px; cursor: pointer; font-size: 0.82rem; }
  .filter-bar { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; align-items: center; }
  .filter-bar input { background: #1e1e1e; border: 1px solid #444; color: #eee; padding: 8px 12px;
                      border-radius: 6px; font-size: 0.85rem; width: 220px; }
  .counter { color: #aaa; font-size: 0.85rem; }
  .counter span { color: #D4AF37; font-weight: bold; }
</style>
</head>
<body>

<h1>🔍 Identify Watch Images</h1>
<p>For each image below, select the brand and optionally note the model. When done, click "Generate Mapping" and copy the result to share with Kiro.</p>

<div class="filter-bar">
  <input type="text" id="filterInput" placeholder="Filter by brand..." oninput="filterCards()" />
  <span class="counter">Assigned: <span id="assignedCount">0</span> / 61</span>
</div>

<div class="grid" id="grid"></div>

<button class="save-btn" onclick="generateOutput()">Generate Mapping</button>
<div id="output"></div>
<button class="copy-btn" onclick="copyOutput()" style="display:none;" id="copyBtn">Copy to Clipboard</button>

<script>
const BRANDS = [
  '-- Unassigned --',
  'Rolex', 'Hublot', 'Patek Philippe', 'Richard Mille',
  'Casio', 'Diesel', 'Poedagar', 'Naviforce', 'Curren',
  'Tissot', 'Michael Kors', 'Hugo Boss', 'Anne Klein',
  'CRRJU', 'Kalbor', 'Heryl', 'Rebirth', 'Hermes',
  'Success Way', 'Other / Mixed'
];

const TOTAL = 379;

const assignments = {};

function buildGrid() {
  const grid = document.getElementById('grid');
  for (let i = 1; i <= TOTAL; i++) {
    const card = document.createElement('div');
    card.className = 'card';
    card.id = `card-${i}`;
    // Mark already-identified Naviforce images (1–61)
    const preAssigned = i <= 61 ? 'Naviforce' : '-- Unassigned --';
    card.innerHTML = `
      <img src="assets/watches/watch-${i}.jpg" alt="watch-${i}" loading="lazy"
           onerror="this.style.background='#333';this.alt='Load error'" />
      <div class="card-body">
        <div class="card-num">watch-${i}.jpg ${i <= 61 ? '<span style="color:#888;font-size:0.7rem;">(prev. identified)</span>' : '<span style="color:#D4AF37;font-size:0.7rem;">★ NEW</span>'}</div>
        <select id="sel-${i}" onchange="onAssign(${i})">
          ${BRANDS.map(b => `<option value="${b}" ${b === preAssigned ? 'selected' : ''}>${b}</option>`).join('')}
        </select>
        <textarea id="note-${i}" placeholder="Model note (optional)…"></textarea>
      </div>`;
    grid.appendChild(card);
    // Pre-mark existing naviforce cards as assigned
    if (i <= 61) card.classList.add('assigned');
  }
}

function onAssign(i) {
  const val = document.getElementById(`sel-${i}`).value;
  assignments[i] = val;
  const card = document.getElementById(`card-${i}`);
  card.classList.toggle('assigned', val !== '-- Unassigned --');
  updateCounter();
  // Auto-save to localStorage
  localStorage.setItem('chronos_img_assignments', JSON.stringify(getAll()));
}

function getAll() {
  const result = {};
  for (let i = 1; i <= TOTAL; i++) {
    const brand = document.getElementById(`sel-${i}`)?.value || '-- Unassigned --';
    const note  = document.getElementById(`note-${i}`)?.value || '';
    result[i] = { brand, note };
  }
  return result;
}

function updateCounter() {
  const count = Object.values(getAll()).filter(v => v.brand !== '-- Unassigned --').length;
  document.getElementById('assignedCount').textContent = `${count} / ${TOTAL}`;
}

function filterCards() {
  const q = document.getElementById('filterInput').value.toLowerCase();
  for (let i = 1; i <= TOTAL; i++) {
    const card = document.getElementById(`card-${i}`);
    const brand = (document.getElementById(`sel-${i}`)?.value || '').toLowerCase();
    card.style.display = (!q || brand.includes(q) || `watch-${i}`.includes(q)) ? '' : 'none';
  }
}

function generateOutput() {
  const all = getAll();
  // Group by brand
  const byBrand = {};
  for (const [num, {brand, note}] of Object.entries(all)) {
    if (brand === '-- Unassigned --') continue;
    if (!byBrand[brand]) byBrand[brand] = [];
    byBrand[brand].push(`watch-${num}.jpg${note ? ' [' + note + ']' : ''}`);
  }
  let text = '=== BRAND → IMAGE MAPPING ===\n\n';
  for (const [brand, imgs] of Object.entries(byBrand).sort()) {
    text += `${brand}:\n  ${imgs.join('\n  ')}\n\n`;
  }
  const unassigned = Object.entries(all).filter(([,v]) => v.brand === '-- Unassigned --').map(([n]) => `watch-${n}.jpg`);
  if (unassigned.length) text += `UNASSIGNED (${unassigned.length}):\n  ${unassigned.join(', ')}\n`;

  const out = document.getElementById('output');
  out.style.display = 'block';
  out.textContent = text;
  document.getElementById('copyBtn').style.display = 'inline-block';
}

function copyOutput() {
  navigator.clipboard.writeText(document.getElementById('output').textContent);
  document.getElementById('copyBtn').textContent = 'Copied ✓';
  setTimeout(() => document.getElementById('copyBtn').textContent = 'Copy to Clipboard', 2000);
}

function restore() {
  const saved = localStorage.getItem('chronos_img_assignments');
  if (!saved) return;
  try {
    const data = JSON.parse(saved);
    for (const [num, {brand, note}] of Object.entries(data)) {
      const sel = document.getElementById(`sel-${num}`);
      const txt = document.getElementById(`note-${num}`);
      if (sel) { sel.value = brand; onAssign(Number(num)); }
      if (txt) txt.value = note || '';
    }
  } catch(e) {}
}

buildGrid();
restore();
</script>
</body>
</html>
